name: Build FOSS Unsigned APK

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Fixed: Targeting the specific universal task to avoid ambiguity
    - name: Build FOSS Release APK
      run: ./gradlew assembleUniversalFossRelease

    # Upload the generated universal APK named as BeatWave-v4.2
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BeatWave-v4.2
        path: app/build/outputs/apk/universal/release/*-unsigned.apk
        retention-days: 7