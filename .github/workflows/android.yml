name: BeatWave Unsigned Release APK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repository se code checkout karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java Environment set up karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # 3. Dummy directory & blank keystore create karna taaki Gradle check pass ho jaye
    - name: Create Dummy Keystore for Unsigned Build
      run: |
        mkdir -p app/keystore
        touch app/keystore/release.keystore

    # 4. Gradle wrapper ko execute karne ki permission dena
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 5. Unsigned Universal Release APK build karna (Bypassing validation)
    - name: Build Unsigned Release APK
      run: ./gradlew assembleUniversalGmsRelease -x validateSigningUniversalGmsRelease

    # 6. Generated Unsigned APK ko upload karna
    - name: Upload BeatWave Unsigned APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BeatWave-Unsigned-Release-APK
        path: app/build/outputs/apk/universalGms/release/*.apk